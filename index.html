<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PedZINC Plus C — Mobile Carousel + Swipe-Up Preview</title>
<style>
  :root { --ph:#e8eaed; --ph-bd:#dadde1; --ph-label:#a3a7ad; --line1:#23a0d8; --line2:#1565b0;
    --sans:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  * { box-sizing:border-box; }
  html,body { margin:0; background:#e9ebee; font-family:var(--sans); color:#222; }
  .phone { max-width:430px; margin:0 auto; background:#fff; min-height:100vh; padding-bottom:150px; position:relative; }
  .nav { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--ph-bd); }
  .logo { display:flex; align-items:center; gap:8px; }
  .logo .mark { width:28px; height:28px; }
  .logo .name .a { font-size:17px; font-weight:700; color:#15355f; letter-spacing:-.3px; }
  .logo .name .d { display:block; font-size:8px; font-weight:600; letter-spacing:4px; color:#5b6675; margin-top:1px; }
  .burger { display:flex; flex-direction:column; gap:4px; }
  .burger span { width:20px; height:2px; background:#5b6675; border-radius:2px; }
  .divider { height:3px; background:linear-gradient(90deg,var(--line1),var(--line2)); }
  .ph { background:var(--ph); border:1px solid var(--ph-bd); display:flex; align-items:center; justify-content:center;
        color:var(--ph-label); font-size:12px; font-weight:500; }
  .adwrap { padding:12px 16px; }
  .adlabel { font-size:8px; letter-spacing:1.2px; color:#b3b7bc; text-transform:uppercase; text-align:center; margin-bottom:4px; }
  .mb-banner { width:320px; max-width:100%; height:50px; margin:0 auto; }
  .mrec { width:300px; max-width:100%; height:250px; margin:0 auto; }
  .content { padding:4px 16px; }
  .teaser { padding:14px 0; border-bottom:1px solid #f0f1f3; }
  .teaser .thumb { width:100%; height:190px; background:var(--ph); border:1px solid var(--ph-bd); border-radius:6px; }
  .teaser .lines { display:flex; flex-direction:column; gap:9px; margin-top:12px; }
  .bar { height:10px; background:#e6e9ed; border-radius:4px; }
  .bar.w1{width:92%} .bar.w2{width:80%} .bar.w3{width:60%}

  /* collapsed CAROUSEL unit, lower-right, bound to the phone column */
  .anchor { position:fixed; bottom:8px; right:max(8px, calc(50% - 207px)); width:min(340px, calc(100vw - 16px));
            height:80px; overflow:hidden; z-index:60; background:#000; cursor:pointer;
            box-shadow:0 4px 16px rgba(0,0,0,.3); border-radius:3px; transition:height .5s cubic-bezier(.4,0,.2,1); }
  .anchor .asset { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:none; }
  .anchor #an-vid { background:#000; }
  .anchor .swipe { position:absolute; left:0; right:0; bottom:4px; display:flex; flex-direction:column; align-items:center;
            color:#fff; pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.6); z-index:5; }
  .anchor .swipe .chev { font-size:13px; letter-spacing:6px; animation:bob 1.1s infinite; }
  .anchor .swipe .txt { font-weight:800; font-size:13px; letter-spacing:1px; }
  .anchor .an-close { position:absolute; top:5px; right:6px; z-index:6; width:24px; height:24px; border-radius:50%;
            background:rgba(0,0,0,.55); color:#fff; border:none; font-size:14px; cursor:pointer; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* expanded interstitial, bound to the phone column */
  .intl { position:fixed; top:0; bottom:0; left:max(0px, calc(50% - 215px)); right:max(0px, calc(50% - 215px));
          background:rgba(0,0,0,.66); z-index:100; display:none; }
  .intl.open { display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .intl .closebar { position:absolute; top:14px; right:14px; z-index:4; }
  .intl .closebar button { background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:20px; padding:8px 16px;
            font-size:14px; font-weight:700; cursor:pointer; letter-spacing:.5px; }
  .intl .card { display:flex; flex-direction:column; align-items:center; }
  .intl .vidwrap { position:relative; background:#000; line-height:0; }
  .intl .vidwrap video { display:block; max-width:min(406px, calc(100vw - 24px)); max-height:74vh; width:auto; height:auto; background:#000; }
  .intl .vidctrl { position:absolute; top:6px; right:6px; display:flex; flex-direction:row; gap:8px; z-index:4; }
  .intl .vidctrl button { width:34px; height:34px; border-radius:50%; background:rgba(0,0,0,.5); color:#fff;
            border:none; font-size:15px; cursor:pointer; line-height:1; }

  /* CTA = Rectangle1.png (button) + LearnMore.png (label) centered on it */
  .cta { position:relative; display:block; width:min(140px, calc(100vw - 32px)); margin:16px auto 0; line-height:0; cursor:pointer; }
  .cta .cta-bg { display:block; width:100%; height:auto; }
  /* label sits centered on the button; tweak the 74% if it reads too big/small */
  .cta .cta-fg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:74%; height:auto; }
</style>
</head>
<body>
<div class="phone">
  <div class="nav">
    <div class="logo">
      <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 6 A44 44 0 0 1 94 50 A44 44 0 0 1 50 94 A30 30 0 0 0 50 34 A22 22 0 0 1 50 6 Z" fill="#1f7fc4"/>
        <path d="M50 94 A44 44 0 0 1 6 50 A44 44 0 0 1 50 6 A30 30 0 0 0 50 66 A22 22 0 0 1 50 94 Z" fill="#27a9dd"/>
      </svg>
      <span class="name"><span class="a">ambient</span><span class="d">DIGITAL</span></span>
    </div>
    <div class="burger"><span></span><span></span><span></span></div>
  </div>
  <div class="divider"></div>
  <div class="adwrap"><div class="adlabel">Advertisement</div><div class="ph mb-banner">320x50</div></div>
  <div class="content">
    <div class="teaser"><div class="thumb"></div><div class="lines"><div class="bar w1"></div><div class="bar w2"></div><div class="bar w3"></div></div></div>
    <div class="teaser"><div class="thumb"></div><div class="lines"><div class="bar w1"></div><div class="bar w2"></div><div class="bar w3"></div></div></div>
  </div>
  <div class="adwrap"><div class="adlabel">Advertisement</div><div class="ph mrec">300x250</div></div>
  <div class="content">
    <div class="teaser"><div class="thumb"></div><div class="lines"><div class="bar w1"></div><div class="bar w2"></div><div class="bar w3"></div></div></div>
    <div class="teaser"><div class="thumb"></div><div class="lines"><div class="bar w1"></div><div class="bar w2"></div><div class="bar w3"></div></div></div>
  </div>
</div>

<!-- COLLAPSED: carousel (video autoplays, then static), lower-right, swipe-up -->
<div class="anchor" id="an-unit" title="Swipe up">
  <button class="an-close" id="an-close" title="Close">&times;</button>
  <video class="asset" id="an-vid" muted playsinline preload="auto">
    <source src="Pedzinc%20Hole%20in%20the%20wall%2015s.mp4" type="video/mp4">
  </video>
  <img class="asset" id="an-stat" src="_300x71.png" alt="PedZINC Plus C">
  <div class="swipe"><div class="chev">&#9650;&#9650;&#9650;</div><div class="txt">SWIPE UP!</div></div>
</div>

<!-- EXPANDED: video + sound + replay + image CTA -->
<div class="intl" id="intl">
  <div class="closebar"><button id="int-close">&times; CLOSE</button></div>
  <div class="card">
    <div class="vidwrap" id="vidwrap">
      <div class="vidctrl">
        <button id="int-sound" title="Sound">&#128263;</button>
        <button id="int-replay" title="Replay">&#8635;</button>
      </div>
      <video id="int-vid" muted playsinline preload="auto">
        <source src="Pedzinc%20Hole%20in%20the%20wall%2015s.mp4" type="video/mp4">
      </video>
    </div>
    <a class="cta" id="int-cta" href="https://www.facebook.com/pedzincplusc" target="_blank" rel="noopener">
      <img class="cta-bg" src="Rectangle1.png" alt="">
      <img class="cta-fg" src="LearnMore.png" alt="Learn More">
    </a>
  </div>
</div>

<script>
(function(){
  var LP='https://www.facebook.com/pedzincplusc';
  var anchor=document.getElementById('an-unit'),
      anClose=document.getElementById('an-close'),
      anVid=document.getElementById('an-vid'),
      anStat=document.getElementById('an-stat'),
      intl=document.getElementById('intl'),
      vid=document.getElementById('int-vid'),
      vidwrap=document.getElementById('vidwrap'),
      sndBtn=document.getElementById('int-sound'),
      repBtn=document.getElementById('int-replay'),
      cta=document.getElementById('int-cta'),
      intClose=document.getElementById('int-close');

  var STATIC_MS=4000, FALLBACK_VID_MS=6000, SLIDE_MS=600;
  var statRatio=452/1910, vidRatio=9/16;
  var MUTE='\uD83D\uDD07', SOUND='\uD83D\uDD0A';
  var expanded=false, cToken=0, cTimer=null;
  function cClear(){ if(cTimer){clearTimeout(cTimer);cTimer=null;} }

  /* ---- carousel inside the corner unit ---- */
  function slideIn(el, other, ratio){
    el.style.transition='none'; el.style.transform='translateY(110%)';
    el.style.display='block'; el.style.zIndex=2; other.style.zIndex=1;
    anchor.style.height=(anchor.clientWidth*ratio)+'px';
    void el.offsetHeight;
    el.style.transition='transform '+SLIDE_MS+'ms cubic-bezier(.22,.61,.36,1)';
    el.style.transform='translateY(0)';
    setTimeout(function(){ other.style.display='none'; }, SLIDE_MS);
  }
  function aVideoPhase(){
    if(expanded) return; var my=++cToken; cClear();
    slideIn(anVid, anStat, vidRatio);
    anVid.muted=true; try{ anVid.currentTime=0; }catch(e){}
    var p=anVid.play(); if(p&&p.catch){ p.catch(function(){}); }
    anVid.onended=function(){ if(my===cToken && !expanded) aStaticPhase(); };
    function arm(){ if(my!==cToken)return; cClear();
      var dur=(isFinite(anVid.duration)&&anVid.duration>0)?(anVid.duration*1000+300):FALLBACK_VID_MS;
      cTimer=setTimeout(function(){ if(my===cToken && !expanded) aStaticPhase(); }, dur); }
    arm();
    anVid.onloadedmetadata=function(){ if(anVid.videoWidth){ vidRatio=anVid.videoHeight/anVid.videoWidth;
      if(anVid.style.display==='block') anchor.style.height=(anchor.clientWidth*vidRatio)+'px'; } arm(); };
  }
  function aStaticPhase(){
    if(expanded) return; var my=++cToken; cClear();
    slideIn(anStat, anVid, statRatio);
    cTimer=setTimeout(function(){ if(my===cToken && !expanded) aVideoPhase(); }, STATIC_MS);
  }
  function startCarousel(){ aVideoPhase(); }
  function stopCarousel(){ cClear(); cToken++; try{anVid.pause();}catch(e){} }

  /* ---- expand / collapse ---- */
  function setSpk(){ sndBtn.innerHTML = vid.muted ? MUTE : SOUND; sndBtn.title = vid.muted ? 'Sound on' : 'Mute'; }
  function expand(){
    if(expanded) return; expanded=true; stopCarousel();
    intl.classList.add('open');
    vid.muted=true; setSpk(); try{ vid.currentTime=0; }catch(e){}
    var p=vid.play(); if(p&&p.catch){ p.catch(function(){}); }
  }
  function closeInterstitial(resume){
    expanded=false; intl.classList.remove('open'); try{ vid.pause(); }catch(e){}
    if(resume) startCarousel();
  }
  function dismiss(){ stopCarousel(); closeInterstitial(false); anchor.style.display='none'; }

  var sy=null;
  anchor.addEventListener('touchstart', function(e){ sy=e.touches[0].clientY; }, {passive:true});
  anchor.addEventListener('touchend', function(e){
    if(sy===null) return; var dy=e.changedTouches[0].clientY - sy; sy=null; if(dy < -30) expand(); });
  anchor.addEventListener('click', function(e){ if(e.target.closest('#an-close')) return; expand(); });
  anClose.addEventListener('click', function(e){ e.stopPropagation(); dismiss(); });

  var oy=null;
  intl.addEventListener('touchstart', function(e){ oy=e.touches[0].clientY; }, {passive:true});
  intl.addEventListener('touchend', function(e){
    if(oy===null) return; var dy=e.changedTouches[0].clientY - oy; oy=null; if(dy > 50) closeInterstitial(true); });

  sndBtn.addEventListener('click', function(e){ e.stopPropagation(); vid.muted=!vid.muted; if(!vid.muted) vid.volume=1; setSpk(); });
  repBtn.addEventListener('click', function(e){ e.stopPropagation(); try{vid.currentTime=0;}catch(_){} vid.play(); });
  intClose.addEventListener('click', function(e){ e.stopPropagation(); closeInterstitial(true); });
  cta.addEventListener('click', function(e){ e.stopPropagation(); });
  vidwrap.addEventListener('click', function(e){ if(e.target.closest('.vidctrl')) return; window.open(LP,'_blank','noopener'); });

  startCarousel(); // video autoplays in the corner, then carousels to static
})();
</script>
</body>
</html>
